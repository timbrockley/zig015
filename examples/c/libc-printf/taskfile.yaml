version: '3'

vars:
  CACHE_PATH: ".zig-cache"
  OUTPUT_PATH: "zig-out"

tasks:
  clean:
    cmds:
      - rm -rf {{.CACHE_PATH}} {{.OUTPUT_PATH}}

  build:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig015 build-exe ../main.zig -femit-bin=lib-cc-shared -lc -fstrip -O ReleaseSmall -target native -mcpu=baseline

  run:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - ./lib-cc-shared {{.CLI_ARGS}}
