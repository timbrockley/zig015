version: '3'

vars:
  CACHE_PATH: ".zig-cache"
  OUTPUT_PATH: "zig-out"

tasks:
  clean:
    cmds:
      - rm -rf {{.CACHE_PATH}} {{.OUTPUT_PATH}}

  build:
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - zig015 build-exe ../main.zig -femit-bin=sqlite-zig -lc -lsqlite3 -fstrip -O ReleaseSmall -mcpu=baseline

  run:
    deps: [build]
    dir: "{{.OUTPUT_PATH}}"
    cmds:
      - ./sqlite-zig {{.CLI_ARGS}}
